name: Post-deploy smoke

# Vercel posts deployment_status events to GitHub when a deploy moves
# state (queued → in_progress → success / error). This workflow fires
# on success and runs `pnpm smoke` against the unique deployment URL
# Vercel returns — catches real production regressions that local
# tests can't see (CDN, CSP, env vars, region routing).
#
# Runs for BOTH production and preview deploys:
#   - production: smoke against the just-promoted main deploy
#   - preview: smoke against PR preview URLs so review can see results
#
# Failure surfaces as a check on the deployment + an annotation on the
# associated commit, so anyone looking at the PR sees red before merge.

on:
  deployment_status:

permissions:
  contents: read
  deployments: read

jobs:
  smoke:
    name: smoke ${{ github.event.deployment_status.environment }}
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Dump deployment_status payload (debug)
        # Always print key payload fields up-front so failures further
        # down can be triaged without re-running locally. Smoke has
        # been failing in <20s on every preview deploy even after the
        # URL preference fix; the only way to know why without local
        # repro is to see what the webhook actually contained.
        run: |
          echo "=== deployment_status webhook fields ==="
          echo "state            = ${{ github.event.deployment_status.state }}"
          echo "environment      = ${{ github.event.deployment_status.environment }}"
          echo "environment_url  = ${{ github.event.deployment_status.environment_url }}"
          echo "target_url       = ${{ github.event.deployment_status.target_url }}"
          echo "log_url          = ${{ github.event.deployment_status.log_url }}"
          echo "description      = ${{ github.event.deployment_status.description }}"
          echo "creator.login    = ${{ github.event.deployment_status.creator.login }}"
          echo "=== deployment fields ==="
          echo "deployment.sha   = ${{ github.event.deployment.sha }}"
          echo "deployment.ref   = ${{ github.event.deployment.ref }}"
          echo "deployment.task  = ${{ github.event.deployment.task }}"

      - name: Resolve deployment URL
        id: resolve
        run: |
          # IMPORTANT: prefer environment_url over target_url. For Vercel
          # deployment_status events, target_url is the inspector URL
          # (vercel.com/.../inspect — gated and unrelated to the deploy),
          # while environment_url is the actual deploy URL (...vercel.app).
          # Earlier the order was reversed and every smoke ran against
          # the gated inspector, failing all marketing-page checks.
          URL="${{ github.event.deployment_status.environment_url || github.event.deployment_status.target_url }}"
          if [ -z "$URL" ]; then
            echo "::warning::No deployment URL in event payload — nothing to smoke."
            echo "::warning::environment_url was: '${{ github.event.deployment_status.environment_url }}'"
            echo "::warning::target_url was: '${{ github.event.deployment_status.target_url }}'"
            exit 1
          fi
          # Strip trailing slash so the smoke runner's path concatenation
          # produces clean URLs like https://host/sitemap.xml not //sitemap.
          URL="${URL%/}"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Resolved smoke target: $URL"

      - name: Reachability probe (HEAD /)
        # Quick sanity check that the resolved URL is publicly reachable
        # before we sink time into pnpm install + smoke runner.
        # -L follow redirects, -I HEAD, -o /dev/null discard body,
        # -w print status, -s silent, --max-time 15.
        run: |
          URL="${{ steps.resolve.outputs.url }}"
          echo "Probing: $URL"
          status=$(curl -sLI -o /dev/null -w '%{http_code}' --max-time 15 "$URL" || echo "curl_failed")
          echo "HEAD / → $status"
          if [ "$status" = "200" ]; then
            echo "✓ Public + 200, proceeding to full smoke."
          elif [ "$status" = "401" ] || [ "$status" = "403" ]; then
            echo "::error::Preview returned $status — deployment protection still on, or wrong URL resolved. Bypass token (VERCEL_AUTOMATION_BYPASS_SECRET) is the standard fix."
            exit 1
          else
            echo "::error::Unexpected HEAD response $status from $URL — see deployment_status payload echoed above."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          # The smoke script lives in the same commit that triggered the
          # deploy. Vercel passes the sha in deployment.sha.
          ref: ${{ github.event.deployment.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run production smoke (HTTP)
        id: http-smoke
        env:
          BASE_URL: ${{ steps.resolve.outputs.url }}
          # Preview deploys behind Vercel Authentication need a bypass
          # token. Generate one in Project Settings → Deployment
          # Protection → Protection Bypass for Automation, then add
          # to repo secrets as VERCEL_AUTOMATION_BYPASS_SECRET.
          # Production deploys typically aren't gated, so this is
          # optional — secret missing = no header sent = still works
          # against public prod URLs.
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: pnpm smoke

      # Tier 4: real browser walk of the quote wizard against the
      # deployed URL. Submits a [SMOKE]-flagged quote that submitQuote
      # auto-cancels server-side, so dispatch doesn't get paged.
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run production smoke (Playwright)
        env:
          BASE_URL: ${{ steps.resolve.outputs.url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: pnpm smoke:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: prod-smoke-report-${{ github.event.deployment_status.environment }}
          path: playwright-report/
          retention-days: 7

      - name: Annotate failure
        if: failure()
        run: |
          echo "::error title=Post-deploy smoke failed::Smoke checks failed against ${{ steps.resolve.outputs.url }} — see job log for which checks regressed."
